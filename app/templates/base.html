<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Insurance Policies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #f5f3ef;
            --card: #ffffff;
            --text: #1b1b1b;
            --muted: #6f6f6f;
            --accent: #0f766e;
            --danger: #b91c1c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #fef3c7, #f5f3ef 55%);
            color: var(--text);
        }

        header {
            padding: 24px 32px;
            border-bottom: 2px solid #e2e8f0;
            background: #fff6ed;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        main {
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        a.button, button {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            background: var(--accent);
        }

        a.button.secondary {
            background: #334155;
        }

        button.danger {
            background: var(--danger);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.6px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .grid.two {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: var(--muted);
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5f5;
            margin-top: 6px;
        }

        .flash {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            background: #fee2e2;
            color: #7f1d1d;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: #ecfeff;
            color: #0f766e;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
        }

        @media (max-width: 720px) {
            main { padding: 20px; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div style="background: #0b4a9f; color: #fff; font-weight: 700; padding: 6px 10px; border-radius: 8px; letter-spacing: 1px;">
                ALLIANZ
            </div>
            <h1>Travel Insurance Policies</h1>
        </div>
        <div class="actions" style="margin-top: 12px;">
            <a class="button secondary" href="{{ url_for('web.list_policies') }}">Policies</a>
            <a class="button secondary" href="{{ url_for('web.list_customers') }}">Customers</a>
        </div>
    </header>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
